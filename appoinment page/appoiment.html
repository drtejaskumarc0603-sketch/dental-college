<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRDCH Appointment</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e3f2fd, #f5f7fa);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 25px 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      animation: fadeIn 0.6s ease-in-out;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 35px;
      height: 35px;
      object-fit: contain;
    }

    #title {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }

    .lang-btn {
      border: none;
      background: #e3f2fd;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #1976d2;
      font-weight: 500;
      transition: 0.3s;
    }

    .lang-btn:hover {
      background: #bbdefb;
    }

    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .grid {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .input-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      margin-bottom: 5px;
      color: #444;
    }

    input,
    select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.3s;
      font-size: 14px;
    }

    input:focus,
    select:focus {
      border-color: #1976d2;
      box-shadow: 0 0 5px rgba(25,118,210,0.3);
    }

    .primary-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #1976d2, #42a5f5);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .primary-btn:hover {
      background: linear-gradient(135deg, #1565c0, #1e88e5);
      transform: translateY(-1px);
    }

    .success {
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 14px;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<div class="wrapper">

  <div class="card">

    <div class="header">
      <div class="header-left">
        <img src="imgaes/image.png" alt="RRDCH Logo" class="logo">
        <h2 id="title">Book Appointment</h2>
      </div>

      <button id="langToggle" class="lang-btn">
        <span class="text">ಕನ್ನಡ</span>
      </button>
    </div>

    <p class="subtitle" id="subtitle">
      Schedule your visit with our dental specialists
    </p>

    <form id="appointmentForm">

      <div class="grid">
        <div class="input-group">
          <label id="labelName">Full Name</label>
          <input type="text" id="name" required>
        </div>

        <div class="input-group">
          <label id="labelPhone">Phone</label>
          <input type="tel" id="phone" required>
        </div>
      </div>

      <div class="grid">
        <div class="input-group">
          <label id="labelEmail">Email</label>
          <input type="email" id="email" required>
        </div>

        <div class="input-group">
          <label id="labelAge">Age</label>
          <input type="number" id="age" required>
        </div>
      </div>

      <div class="grid">
        <div class="input-group">
          <label id="labelGender">Gender</label>
          <select id="gender" required>
            <option value="" id="selectGender">Select</option>
            <option id="male">Male</option>
            <option id="female">Female</option>
            <option id="other">Other</option>
          </select>
        </div>

        <div class="input-group">
          <label id="labelDate">Date</label>
          <input type="date" id="date" required>
        </div>
      </div>

      <div class="input-group">
        <label>Department</label>
        <select id="department" required>
          <option value="">Select</option>
          <option value="Dental">Dental</option>
          <option value="Orthodontics">Orthodontics</option>
          <option value="Surgery">Surgery</option>
        </select>
      </div>

      <button type="submit" id="submitBtn" class="primary-btn">
        Book Appointment
      </button>

    </form>

    <div id="successMsg" class="success" style="display:none;">
      Appointment booked successfully ✓
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
